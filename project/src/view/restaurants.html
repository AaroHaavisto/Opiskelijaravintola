<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opiskelijaravintolat</title>
    <link rel="stylesheet" href="../../css/restaurants_style.css" />
  </head>
  <body>
    <script>
      window.RESTAURANT_API_BASE_URL =
        'https://media2.edu.metropolia.fi/restaurant/api/v1';
    </script>

    <section class="landing-hero">
      <div class="hero-actions">
        <a href="profile.html" class="profile-nav" aria-label="Avaa profiili">
          <img
            src="../../img/picture8.jpg"
            alt="Profiili"
            class="profile-avatar"
            id="heroAvatar"
          />
          <span class="profile-name" id="heroProfileName">Opiskelija</span>
        </a>
        <button type="button" class="logout-btn" id="logoutBtn">Logout</button>
      </div>

      <div class="hero-content">
        <h1>Opiskelijaravintolat</h1>
        <p>Valitse ravintola ja tarkastele ruokalistaa</p>
        <a href="#content" class="scroll-btn">↓ Selaa alas ↓</a>
      </div>
    </section>

    <main id="content" class="container">
      <!-- Search and Filter Section -->
      <section class="search-section">
        <div class="search-container">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Hae ravintoloita..."
            aria-label="Hae ravintoloita nimellä tai osoitteella"
          />
          <button class="search-btn" id="searchBtn">Hae</button>
        </div>

        <div class="menu-type-buttons">
          <button
            class="menu-btn-daily active"
            id="dailyBtn"
            aria-pressed="true"
          >
            Päivän ruokalista
          </button>
          <button class="menu-btn-weekly" id="weeklyBtn" aria-pressed="false">
            Viikon ruokalista
          </button>
        </div>

        <div class="view-filter-bar">
          <button
            type="button"
            class="view-filter-btn active"
            data-filter="all"
          >
            Kaikki ravintolat
          </button>
          <button type="button" class="view-filter-btn" data-filter="favorites">
            Tykätyt ravintolat
          </button>
        </div>
      </section>

      <div class="content-wrapper">
        <!-- Restaurants List -->
        <aside class="restaurants-sidebar">
          <h2>Ravintolat</h2>
          <div id="restaurantsList" class="restaurants-list">
            <div class="loading">Ladataan ravintoloita...</div>
          </div>
        </aside>

        <!-- Menu Display -->
        <section class="menu-section">
          <div id="menuContent" class="menu-content">
            <div class="empty-state">
              <p>Valitse ravintola nähdäksesi ruokalistan</p>
            </div>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <p>&copy; 2026 Opiskelijaravintolat. Kaikki oikeudet pidätetään.</p>
    </footer>

    <script type="module" src="../js/restaurants.js"></script>
  </body>
</html>
